general:
  front_end:
    _type: dragent_fastapi
    a2a:
      server:
        name: "医療機器アフターメンテナンス支援エージェント"
        description: >
          EVS-X1000 内視鏡システムのアフターメンテナンスを支援するエージェント。
          フィールドサポートエンジニア（現場対応）およびリモートサポートエンジニア（HQトリアージ）の
          2ペルソナに対応し、エラーコード検索・修理履歴分析・ベテラン知見RAGを組み合わせた根拠付き回答を提供する。
      skills:
        - id: field_support
          name: "フィールド現場支援"
          description: "現場で発生したエラーへの対処手順をステップ形式で提供する"
          tags: [field, endoscope, troubleshooting]
          examples:
            - "INS-001のエラーが出た。アングルノブを操作しても戻りが片側だけ遅い"
            - "送水ボタンを押しても水が出ない。AWS-001と表示されている"
        - id: remote_triage
          name: "リモートトリアージ支援"
          description: "コールセンター情報を基にディスパッチ要否・推奨部品を判断するトリアージ支援を提供する"
          tags: [remote, triage, dispatch]
          examples:
            - "[REMOTE] EVS-X1000、AWS-001のエラー。送水ボタンを押しても水が出ない"
            - "[REMOTE] OPT-002のエラー。画像にノイズが出ている。過去に同様事例はあるか"
llms:
  datarobot_llm:
    _type: datarobot-llm-component
workflow:
  _type: langgraph_agent
  llm_name: datarobot_llm
  description: >
    EVS-X1000 内視鏡システム向けアフターメンテナンス支援エージェント。
    5ツール（exact_lookup / structured_query / semantic_search / voice_search / image_search）を
    組み合わせてフィールド・リモートの2ペルソナに根拠付きで回答する。
authentication:
  datarobot_auth:
    _type: datarobot_api_key
